<script>
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];
let animId = null;
let discoInterval = null;

function loop() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles = particles.filter(p => p.life > 0);

  particles.forEach(p => p.update());

  if (particles.length > 0) {
    animId = requestAnimationFrame(loop);
  } else {
    animId = null;
  }
}

function startLoop() {
  if (!animId) animId = requestAnimationFrame(loop);
}

class Particle {
  constructor({ x, y, vx, vy, size, color, shape='circle', gravity=0.15, fade=0.015, spin=0 }) {
    this.x = x;
    this.y = y;
    this.vx = vx;
    this.vy = vy;
    this.size = size;
    this.color = color;
    this.shape = shape;
    this.gravity = gravity;
    this.fade = fade;
    this.spin = spin;
    this.life = 1;
    this.angle = Math.random() * Math.PI * 2;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += this.gravity;
    this.vx *= 0.99;
    this.life -= this.fade;
    this.angle += this.spin;

    ctx.save();
    ctx.globalAlpha = Math.max(0, this.life);
    ctx.fillStyle = this.color;

    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);

    if (this.shape === 'rect') {
      ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size * 0.5);
    }
    else if (this.shape === 'heart') {
      ctx.font = `${this.size * 2}px serif`;
      ctx.fillText(this.color, -this.size, this.size * 0.5);
    }
    else {
      ctx.beginPath();
      ctx.arc(0, 0, this.size, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

const COLORS = ['#f97316','#a855f7','#22d3ee','#f43f5e','#4ade80','#facc15','#fb7185','#818cf8'];

function confetti(cx, cy) {
  for (let i = 0; i < 120; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 3 + Math.random() * 6;

    particles.push(new Particle({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      size: 5 + Math.random() * 5,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      shape: Math.random() > 0.5 ? 'rect' : 'circle',
      gravity: 0.2,
      fade: 0.008,
      spin: (Math.random() - 0.5) * 0.3
    }));
  }
  startLoop();
}

function firework(cx, cy) {
  for (let b = 0; b < 3; b++) {
    setTimeout(() => {
      const bx = cx + (Math.random() - 0.5) * 200;
      const by = cy - Math.random() * 200;
      const hue = Math.random() * 360;

      for (let i = 0; i < 70; i++) {
        const angle = (Math.PI * 2 * i) / 70;
        const speed = 2 + Math.random() * 5;

        particles.push(new Particle({
          x: bx,
          y: by,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 2 + Math.random() * 3,
          color: `hsl(${hue},90%,65%)`,
          gravity: 0.08,
          fade: 0.012
        }));
      }
      startLoop();
    }, b * 400);
  }
}

function hearts(cx, cy) {
  const emojis = ['💖','💕','💗','💝','🧡','💛'];

  for (let i = 0; i < 30; i++) {
    particles.push(new Particle({
      x: cx + (Math.random() - 0.5) * 100,
      y: cy,
      vx: (Math.random() - 0.5) * 3,
      vy: -(2 + Math.random() * 5),
      size: 10 + Math.random() * 14,
      color: emojis[Math.floor(Math.random() * emojis.length)],
      shape: 'heart',
      gravity: -0.05,
      fade: 0.01,
      spin: (Math.random() - 0.5) * 0.1
    }));
  }
  startLoop();
}

function stars(cx, cy) {
  const emojis = ['⭐','✨','🌟','💫'];

  for (let i = 0; i < 50; i++) {
    const angle = Math.random() * Math.PI * 2;

    particles.push(new Particle({
      x: cx,
      y: cy,
      vx: Math.cos(angle) * (1 + Math.random() * 4),
      vy: Math.sin(angle) * (1 + Math.random() * 4) - 2,
      size: 10 + Math.random() * 10,
      color: emojis[Math.floor(Math.random() * emojis.length)],
      shape: 'heart',
      gravity: 0.03,
      fade: 0.009
    }));
  }
  startLoop();
}

function cake(cx, cy) {
  const smoke = ['rgba(255,255,255,0.6)','rgba(255,220,100,0.5)','rgba(255,150,50,0.4)'];

  for (let i = 0; i < 40; i++) {
    particles.push(new Particle({
      x: cx + (Math.random() - 0.5) * 60,
      y: cy,
      vx: (Math.random() - 0.5) * 1.5,
      vy: -(1 + Math.random() * 3),
      size: 8 + Math.random() * 20,
      color: smoke[Math.floor(Math.random() * smoke.length)],
      shape: 'circle',
      gravity: -0.04,
      fade: 0.008
    }));
  }

  confetti(cx, cy);
}

function discoBg() {
  clearInterval(discoInterval);

  let t = 0;

  discoInterval = setInterval(() => {
    t++;
    const hue = (t * 12) % 360;

    document.getElementById('card').style.boxShadow =
      `0 0 60px hsla(${hue},80%,50%,0.3), 0 0 120px hsla(${(hue+180)%360},80%,50%,0.15)`;

    if (t > 20) {
      clearInterval(discoInterval);
      document.getElementById('card').style.boxShadow = '0 0 60px rgba(0,0,0,0.5)';
    }
  }, 80);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      const hue = Math.random() * 360;

      for (let j = 0; j < 40; j++) {
        const angle = (Math.PI * 2 * j) / 40;
        const speed = 1 + Math.random() * 4;

        particles.push(new Particle({
          x: cx + (Math.random() - 0.5) * 300,
          y: cy + (Math.random() - 0.5) * 300,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          size: 3 + Math.random() * 5,
          color: `hsl(${hue},90%,65%)`,
          shape: Math.random() > 0.5 ? 'rect' : 'circle',
          gravity: 0.05,
          fade: 0.014
        }));
      }
      startLoop();
    }, i * 150);
  }
}

function triggerAll() {
  const cx = canvas.width / 2;
  const cy = canvas.height / 2;

  confetti(cx, cy);
  setTimeout(() => firework(cx, cy), 300);
  setTimeout(() => hearts(cx, cy), 700);
  setTimeout(() => discoBg(), 1000);
}

document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', e => {
    const id = btn.dataset.id;
    const x = e.clientX;
    const y = e.clientY;

    if (id === 'confetti') confetti(x, y);
    else if (id === 'firework') firework(x, y);
    else if (id === 'disco') discoBg();
    else if (id === 'hearts') hearts(x, y);
    else if (id === 'rain') stars(x, y);
    else if (id === 'cake') cake(x, y);
  });
});
</script>
