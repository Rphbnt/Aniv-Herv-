<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bon Anniv Hervé 🎉</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0c0c0e;
  color:#fff;
  font-family:'DM Sans',sans-serif;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card{
  background:#141416;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:500px;
  text-align:center;
}

h1{
  font-family:'Syne',sans-serif;
  font-size:2.5rem;
  margin-bottom:10px;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:20px;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1f1f23;
  color:white;
  cursor:pointer;
}

canvas{
  position:fixed;
  top:0;
  left:0;
  pointer-events:none;
}
</style>
</head>

<body>

<canvas id="fx"></canvas>

<div class="card">
  <h1>🎂 Joyeux anniversaire Hervé</h1>
  <p>de la part de Raphaël 🧡</p>

  <div class="btns">
    <button onclick="confetti()">🎊 Confettis</button>
    <button onclick="firework()">🎆 Feux</button>
    <button onclick="hearts()">💖 Amour</button>
    <button onclick="stars()">✨ Étoiles</button>
    <button onclick="disco()">🪩 Disco</button>
    <button onclick="cake()">🎂 Gâteau</button>
  </div>
</div>

<script>
const canvas=document.getElementById('fx');
const ctx=canvas.getContext('2d');

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener('resize',resize);

let particles=[];

class Particle{
  constructor(o){
    this.x=o.x;
    this.y=o.y;
    this.vx=o.vx;
    this.vy=o.vy;
    this.size=o.size;
    this.color=o.color;
    this.life=1;
    this.gravity=o.gravity||0.1;
  }

  update(){
    this.x+=this.vx;
    this.y+=this.vy;
    this.vy+=this.gravity;
    this.life-=0.01;

    ctx.globalAlpha=this.life;
    ctx.fillStyle=this.color;
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>p.update());
  requestAnimationFrame(loop);
}
loop();

function confetti(){
  for(let i=0;i<100;i++){
    particles.push(new Particle({
      x:innerWidth/2,
      y:innerHeight/2,
      vx:(Math.random()-0.5)*8,
      vy:(Math.random()-0.5)*8,
      size:4,
      color:`hsl(${Math.random()*360},100%,60%)`
    }));
  }
}

function firework(){
  for(let i=0;i<150;i++){
    particles.push(new Particle({
      x:innerWidth/2,
      y:innerHeight/2,
      vx:(Math.random()-0.5)*10,
      vy:(Math.random()-0.5)*10,
      size:3,
      color:`hsl(${Math.random()*360},100%,70%)`
    }));
  }
}

function hearts(){
  for(let i=0;i<40;i++){
    particles.push(new Particle({
      x:innerWidth/2,
      y:innerHeight/2,
      vx:(Math.random()-0.5)*4,
      vy:-Math.random()*6,
      size:6,
      color:'pink',
      gravity:-0.02
    }));
  }
}

function stars(){
  for(let i=0;i<60;i++){
    particles.push(new Particle({
      x:innerWidth/2,
      y:innerHeight/2,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      size:2,
      color:'white'
    }));
  }
}

function disco(){
  let t=0;
  let interval=setInterval(()=>{
    t++;
    document.body.style.background=`hsl(${t*20},50%,10%)`;
    if(t>20){
      clearInterval(interval);
      document.body.style.background='#0c0c0e';
    }
  },80);
}

function cake(){
  confetti();
}
</script>

</body>
</html>
