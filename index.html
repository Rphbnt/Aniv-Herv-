<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bon Anniversaire Hervé 🎉</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0c0c0e; --card: #141416; --border: rgba(255,255,255,0.07);
  --white: #f4f4f5; --dim: #888;
  --a: #f97316; --b: #a855f7; --c: #22d3ee; --d: #f43f5e; --e: #4ade80;
}
html, body { height: 100%; }
body {
  background: var(--bg); color: var(--white);
  font-family: 'DM Sans', sans-serif;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow-x: hidden; padding: 16px 0;
}
body::before {
  content:''; position: fixed; inset:0;
  background:
    radial-gradient(ellipse 600px 400px at 20% 50%, rgba(249,115,22,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 500px at 80% 30%, rgba(168,85,247,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 60% 80%, rgba(34,211,238,0.04) 0%, transparent 70%);
  pointer-events:none; animation: bgPulse 8s ease-in-out infinite alternate;
}
@keyframes bgPulse { from { opacity:0.6; } to { opacity:1; } }
.card {
  width: min(520px, 94vw); background: var(--card);
  border: 1px solid var(--border); border-radius: 20px;
  padding: clamp(24px,6vw,48px) clamp(20px,6vw,40px) clamp(20px,5vw,40px);
  position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.5);
}
.card::before {
  content:''; position: absolute; top:0; left:10%; right:10%; height:1px;
  background: linear-gradient(to right, transparent, rgba(255,255,255,0.15), transparent);
}
.eyebrow {
  font-size: 0.7rem; letter-spacing: 0.25em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 10px; opacity:0;
  animation: up 0.6s ease 0.1s forwards;
}
.title {
  font-family: 'Syne', sans-serif; font-size: clamp(2rem,10vw,3.4rem);
  font-weight: 800; line-height: 1; letter-spacing: -0.02em;
  margin-bottom: 6px; opacity:0; animation: up 0.6s ease 0.2s forwards;
}
.title .name {
  display: block;
  background: linear-gradient(135deg, var(--a), var(--b));
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
}
.from {
  font-size: 0.85rem; color: var(--dim);
  margin-bottom: clamp(20px,5vw,36px); opacity:0; animation: up 0.6s ease 0.3s forwards;
}
.from span { color: var(--white); }
@keyframes up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
.divider {
  height:1px; background: var(--border);
  margin-bottom: clamp(18px,4vw,28px); opacity:0; animation: up 0.6s ease 0.35s forwards;
}
.label {
  font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--dim); margin-bottom: 14px; opacity:0; animation: up 0.6s ease 0.4s forwards;
}
.btns {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 10px; opacity:0; animation: up 0.6s ease 0.5s forwards;
}
.btn {
  position: relative; padding: clamp(12px,3vw,14px) clamp(12px,3vw,16px);
  border: 1px solid var(--border); border-radius: 12px;
  background: rgba(255,255,255,0.03); color: var(--white);
  font-family: 'DM Sans', sans-serif; font-size: clamp(0.78rem,3.5vw,0.85rem);
  cursor: pointer; text-align: left;
  transition: border-color 0.2s, transform 0.15s, background 0.2s;
  overflow: hidden; user-select: none; -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(0.96); }
.btn .ico { font-size: clamp(1.1rem,5vw,1.3rem); display:block; margin-bottom:6px; }
.btn .lbl { display:block; font-weight:400; }
.btn .sub { display:block; font-size: clamp(0.65rem,2.8vw,0.72rem); color:var(--dim); margin-top:2px; }
.btn-a{--c1:var(--a)} .btn-b{--c1:var(--b)} .btn-c{--c1:var(--c)}
.btn-d{--c1:var(--d)} .btn-e{--c1:var(--e)} .btn-f{--c1:#facc15}
.btn:hover {
  border-color: var(--c1); background: color-mix(in srgb, var(--c1) 8%, transparent);
  transform: translateY(-2px);
}
.btn.fired { animation: btnPop 0.4s ease; }
@keyframes btnPop { 0%{transform:scale(1)} 40%{transform:scale(0.93)} 70%{transform:scale(1.04)} 100%{transform:scale(1)} }
.ripple {
  position: absolute; border-radius: 50%; background: var(--c1);
  opacity: 0.25; transform: scale(0); animation: ripple 0.5s ease-out forwards; pointer-events: none;
}
@keyframes ripple { to { transform: scale(4); opacity: 0; } }
.feedback {
  min-height: 48px; height: auto; display: flex; align-items: center;
  padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px;
  background: rgba(255,255,255,0.02); font-size: clamp(0.8rem,3.5vw,0.9rem);
  color: var(--dim); transition: border-color 0.3s, color 0.3s;
  margin-bottom: 10px; opacity:0; animation: up 0.6s ease 0.55s forwards;
  line-height: 1.4; word-break: break-word;
}
.feedback.active { border-color: var(--active-color, var(--a)); color: var(--white); }
canvas#fx { position: fixed; inset:0; pointer-events:none; z-index:999; }
.footer {
  margin-top: clamp(16px,4vw,24px); display:flex; justify-content:space-between;
  align-items:center; opacity:0; animation: up 0.6s ease 0.6s forwards;
}
.footer-tag { font-size:0.7rem; color:var(--dim); letter-spacing:0.1em; }
.heart { font-size: 1.1rem; animation: heartbeat 1.5s ease-in-out infinite; cursor: pointer; }
@keyframes heartbeat { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="card" id="card">
  <p class="eyebrow">🎂 &nbsp;aujourd'hui c'est ton jour</p>
  <h1 class="title">Joyeux<br>Anniversaire<span class="name">Hervé</span></h1>
  <p class="from">de la part de <span>Raphaël</span> 🧡</p>
  <div class="divider"></div>
  <p class="label">Appuie sur un bouton —</p>
  <div class="btns">
    <button class="btn btn-a" data-id="confetti"><span class="ico">🎊</span><span class="lbl">Confettis</span><span class="sub">lâche les ballons</span></button>
    <button class="btn btn-b" data-id="firework"><span class="ico">🎆</span><span class="lbl">Feux d'artifice</span><span class="sub">boom boom</span></button>
    <button class="btn btn-c" data-id="disco"><span class="ico">🪩</span><span class="lbl">Disco</span><span class="sub">on fait la fête</span></button>
    <button class="btn btn-d" data-id="hearts"><span class="ico">💖</span><span class="lbl">Amour</span><span class="sub">avec tout mon cœur</span></button>
    <button class="btn btn-e" data-id="rain"><span class="ico">✨</span><span class="lbl">Étoiles</span><span class="sub">pour toi</span></button>
    <button class="btn btn-f" data-id="cake"><span class="ico">🎂</span><span class="lbl">Le gâteau</span><span class="sub">souffle les bougies</span></button>
  </div>
  <div class="feedback" id="feedback">← clique quelque chose !</div>
  <div class="footer">
    <span class="footer-tag">fait avec 🧡 par Raphaël</span>
    <span class="heart" onclick="triggerAll()">💫</span>
  </div>
</div>
<script>
const canvas = document.getElementById('fx');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });

let particles = [], animId = null, discoInterval = null;

function loop() {
ctx.clearRect(0,0,canvas.width,canvas.height);
particles = particles.filter(p => p.life > 0);
particles.forEach(p => p.update());
if (particles.length > 0) animId = requestAnimationFrame(loop); else animId = null;
}
function startLoop() { if (!animId) animId = requestAnimationFrame(loop); }

class Particle {
constructor({ x,y,vx,vy,size,color,shape=‘circle’,gravity=0.15,fade=0.015,spin=0 }) {
Object.assign(this, {x,y,vx,vy,size,color,shape,gravity,fade,spin,life:1,angle:Math.random()*Math.PI*2});
}
update() {
this.x+=this.vx; this.y+=this.vy; this.vy+=this.gravity; this.vx*=0.99;
this.life-=this.fade; this.angle+=this.spin;
ctx.save(); ctx.globalAlpha=Math.max(0,this.life); ctx.fillStyle=this.color;
ctx.translate(this.x,this.y); ctx.rotate(this.angle);
if(this.shape===‘rect’){ctx.fillRect(-this.size/2,-this.size/2,this.size,this.size*0.5);}
else if(this.shape===‘heart’){ctx.font=`${this.size*2}px serif`;ctx.fillText(this.color,-this.size,this.size*0.5);}
else{ctx.beginPath();ctx.arc(0,0,this.size,0,Math.PI*2);ctx.fill();}
ctx.restore();
}
}

const COLORS=[’#f97316’,’#a855f7’,’#22d3ee’,’#f43f5e’,’#4ade80’,’#facc15’,’#fb7185’,’#818cf8’];

function confetti(cx,cy){
for(let i=0;i<120;i++){const a=Math.random()*Math.PI*2,s=3+Math.random()*6;
particles.push(new Particle({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,size:5+Math.random()*5,color:COLORS[Math.floor(Math.random()*COLORS.length)],shape:Math.random()>0.5?‘rect’:‘circle’,gravity:0.2,fade:0.008,spin:(Math.random()-0.5)*0.3}));}
startLoop();
}
function firework(cx,cy){
for(let b=0;b<3;b++){setTimeout(()=>{const bx=cx+(Math.random()-0.5)*200,by=cy-Math.random()*200,hue=Math.random()*360;
for(let i=0;i<70;i++){const a=(Math.PI*2*i)/70,s=2+Math.random()*5;
particles.push(new Particle({x:bx,y:by,vx:Math.cos(a)*s,vy:Math.sin(a)*s,size:2+Math.random()*3,color:`hsl(${hue+Math.random()*30},90%,65%)`,gravity:0.08,fade:0.012}));}
startLoop();},b*400);}
}
function hearts(cx,cy){
const em=[‘💖’,‘💕’,‘💗’,‘💝’,‘🧡’,‘💛’];
for(let i=0;i<30;i++){particles.push(new Particle({x:cx+(Math.random()-0.5)*100,y:cy,vx:(Math.random()-0.5)*3,vy:-(2+Math.random()*5),size:10+Math.random()*14,color:em[Math.floor(Math.random()*em.length)],shape:‘heart’,gravity:-0.05,fade:0.01,spin:(Math.random()-0.5)*0.1}));}
startLoop();
}
function stars(cx,cy){
const em=[‘⭐’,‘✨’,‘🌟’,‘💫’];
for(let i=0;i<50;i++){const a=Math.random()*Math.PI*2;
particles.push(new Particle({x:cx,y:cy,vx:Math.cos(a)*(1+Math.random()*4),vy:Math.sin(a)*(1+Math.random()*4)-2,size:10+Math.random()*10,color:em[Math.floor(Math.random()*em.length)],shape:‘heart’,gravity:0.03,fade:0.009}));}
startLoop();
}
function cake(cx,cy){
const pc=[‘rgba(255,255,255,0.6)’,‘rgba(255,220,100,0.5)’,‘rgba(255,150,50,0.4)’];
for(let i=0;i<40;i++){particles.push(new Particle({x:cx+(Math.random()-0.5)*60,y:cy,vx:(Math.random()-0.5)*1.5,vy:-(1+Math.random()*3),size:8+Math.random()*20,color:pc[Math.floor(Math.random()*pc.length)],shape:‘circle’,gravity:-0.04,fade:0.008}));}
confetti(cx,cy);
}
function discoBg(){
clearInterval(discoInterval); let t=0;
discoInterval=setInterval(()=>{t++;const hue=(t*12)%360;
document.getElementById(‘card’).style.boxShadow=`0 0 60px hsla(${hue},80%,50%,0.3),0 0 120px hsla(${(hue+180)%360},80%,50%,0.15)`;
if(t>20){clearInterval(discoInterval);document.getElementById(‘card’).style.boxShadow=‘0 0 60px rgba(0,0,0,0.5)’;}},80);
const cx=canvas.width/2,cy=canvas.height/2;
for(let i=0;i<5;i++){setTimeout(()=>{const hue=Math.random()*360;
for(let j=0;j<40;j++){const a=(Math.PI*2*j)/40,s=1+Math.random()*4;
particles.push(new Particle({x:cx+(Math.random()-0.5)*300,y:cy+(Math.random()-0.5)*300,vx:Math.cos(a)*s,vy:Math.sin(a)*s,size:3+Math.random()*5,color:`hsl(${hue},90%,65%)`,shape:Math.random()>0.5?‘rect’:‘circle’,gravity:0.05,fade:0.014}));}
startLoop();},i*150);}
}
function triggerAll(){
const cx=canvas.width/2,cy=canvas.height/2;
confetti(cx,cy); setTimeout(()=>firework(cx,cy),300);
setTimeout(()=>hearts(cx,cy),700); setTimeout(()=>discoBg(),1000);
}

const messages={
confetti:{text:‘🎊 Confettis lancés !’,color:’#f97316’},
firework:{text:‘🎆 Booom ! Joyeux anniversaire Hervé !’,color:’#a855f7’},
disco:{text:‘🪩 On fait la fête !’,color:’#22d3ee’},
hearts:{text:‘💖 Avec tout mon amour, Raphaël’,color:’#f43f5e’},
rain:{text:‘✨ Une pluie d'étoiles pour toi !’,color:’#4ade80’},
cake:{text:‘🎂 Souffle les bougies… et fais un vœu !’,color:’#facc15’},
};

document.querySelectorAll(’.btn’).forEach(btn=>{
btn.addEventListener(‘click’,function(e){
const id=this.dataset.id, cx=e.clientX, cy=e.clientY;
const r=document.createElement(‘div’); r.className=‘ripple’;
const sz=60; r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.offsetX-sz/2}px;top:${e.offsetY-sz/2}px`;
this.appendChild(r); setTimeout(()=>r.remove(),500);
this.classList.remove(‘fired’); void this.offsetWidth; this.classList.add(‘fired’);
if(id===‘confetti’)confetti(cx,cy);
else if(id===‘firework’)firework(cx,cy);
else if(id===‘disco’)discoBg();
else if(id===‘hearts’)hearts(cx,cy);
else if(id===‘rain’)stars(cx,cy);
else if(id===‘cake’)cake(cx,cy);
const fb=document.getElementById(‘feedback’),m=messages[id];
fb.textContent=m.text; fb.style.setProperty(’–active-color’,m.color); fb.classList.add(‘active’);
clearTimeout(fb._t); fb._t=setTimeout(()=>{fb.classList.remove(‘active’);fb.textContent=‘← clique quelque chose !’;},3000);
});
});
</script>

</body>
</html>
